<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Book of Knowledge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
/* ─── RESET & TOKENS ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #07091a;
  --gold:        #c9a227;
  --gold-lt:     #f0d47a;
  --gold-glow:   rgba(201,162,39,.35);
  --gold-dim:    rgba(201,162,39,.18);
  --leather-dk:  #2d0f05;
  --leather-md:  #5a1e08;
  --leather-lt:  #8b3810;
  --parchment:   #f5ecd4;
  --ink:         #1a0f02;
  --ink2:        #3a2510;
  --fd: 'Cinzel', 'Palatino Linotype', serif;
  --fb: 'IM Fell English', Georgia, serif;
}

html, body {
  height: 100%; overflow: hidden;
  background: #0e0a06; color: #ddd;
  font-family: var(--fb);
}

#bg-canvas {
  position: fixed; inset: 0;
  width: 100vw; height: 100vh;
  z-index: 0; pointer-events: none;
}

#app {
  position: relative; z-index: 1;
  height: 100vh;
  display: flex; align-items: center; justify-content: center;
}

/* ─── SCENE ──────────────────────────────────────────────────── */
#scene {
  display: flex; flex-direction: column;
  align-items: center; gap: 2rem;
  padding: 1.5rem 1rem;
  max-width: 480px; width: 100%;
}

.site-header { text-align: center; }
.header-rule {
  width: 80%; max-width: 320px; height: 1px;
  margin: 0.5rem auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.site-header h1 {
  font-family: var(--fd);
  font-size: clamp(1.1rem, 4vw, 1.7rem); font-weight: 700;
  color: var(--gold-lt); letter-spacing: .12em;
  text-shadow: 0 0 18px var(--gold-glow), 0 0 40px var(--gold-glow);
  margin: .5rem 0 .3rem;
}
.site-header p {
  font-style: italic; font-size: .9rem;
  color: rgba(220,195,140,.55); letter-spacing: .04em;
}

/* ─── BOOK STAGE ─────────────────────────────────────────────── */
#book-stage {
  position: relative; width: 240px; height: 300px;
  display: flex; align-items: center; justify-content: center;
  perspective: 1400px;
}

.book-halo {
  position: absolute; inset: -30px; border-radius: 50%;
  background: radial-gradient(ellipse at center,
    rgba(201,162,39,.18) 0%, rgba(201,162,39,.06) 45%, transparent 70%);
  animation: halo-pulse 3.5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes halo-pulse {
  0%,100% { opacity:.7; transform: scale(1); }
  50%      { opacity:1;  transform: scale(1.12); }
}

#book {
  position: relative; width: 200px; height: 270px;
  transform-style: preserve-3d;
  animation: book-idle 5s ease-in-out infinite;
  filter: drop-shadow(0 24px 48px rgba(0,0,0,.75));
}
@keyframes book-idle {
  0%,100% { transform: rotateY(-18deg) translateY(0); }
  50%      { transform: rotateY(-12deg) translateY(-10px); }
}

.book-cover {
  position: absolute; inset: 0;
  border-radius: 4px 14px 14px 4px;
}
.front-cover {
  background: linear-gradient(160deg,
    var(--leather-dk) 0%, var(--leather-md) 35%,
    var(--leather-lt) 60%, var(--leather-md) 80%, var(--leather-dk) 100%);
  border: 1.5px solid rgba(201,162,39,.45);
  box-shadow: inset 0 0 25px rgba(0,0,0,.45),
    inset 3px 0 6px rgba(255,200,100,.08), 5px 0 18px rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
  transform-origin: left center; backface-visibility: hidden; z-index: 2;
}
.back-cover {
  background: linear-gradient(to right, #1a0704, #3d1507);
  border-radius: 14px 4px 4px 14px; transform: translateZ(-10px); z-index: 0;
}
.cover-border {
  width: calc(100% - 24px); height: calc(100% - 24px);
  border: 1px solid rgba(201,162,39,.3);
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 16px 12px;
}
.cover-ornament {
  color: var(--gold); font-size: 1.4rem;
  text-shadow: 0 0 12px var(--gold); display: block;
}
.cover-title { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.cover-title-latin {
  font-family: var(--fd); font-size: .75rem; font-weight: 700;
  letter-spacing: .28em; color: var(--gold-lt);
  text-shadow: 0 0 8px var(--gold-glow);
}
.cover-title-latin.sub { font-size: .55rem; color: var(--gold); letter-spacing: .2em; }

.book-spine {
  position: absolute; left: -16px; top: 0; width: 16px; height: 100%;
  background: linear-gradient(to right, #200a02, var(--leather-dk), #3d1507);
  border-radius: 4px 0 0 4px;
  transform: rotateY(-90deg); transform-origin: right center;
}
.book-page-block {
  position: absolute; right: -8px; top: 5px;
  width: 10px; height: calc(100% - 10px);
  background: repeating-linear-gradient(to bottom,
    #f5ecd4 0px, #e8d8b0 1px, #f0e6cc 1px, #f0e6cc 3px);
  border-radius: 0 2px 2px 0;
  transform: rotateY(90deg); transform-origin: left center; z-index: 1;
}

/* book open animation */
#book.opening { animation: none !important; }
#book.opening .front-cover {
  animation: cover-open 0.9s cubic-bezier(.4,0,.2,1) forwards;
}
#book.opening .book-page-block {
  animation: pages-shrink .4s ease forwards;
}
@keyframes cover-open {
  0%   { transform: rotateY(0deg); }
  100% { transform: rotateY(-145deg); }
}
@keyframes pages-shrink { to { opacity:0; transform: rotateY(90deg) scaleX(0); } }

/* burst particles */
#burst-root {
  position: absolute; top: 50%; left: 50%;
  width: 0; height: 0; pointer-events: none; z-index: 10;
}
.burst-particle {
  position: absolute; width: 5px; height: 5px; border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold), 0 0 16px rgba(201,162,39,.5);
  animation: burst-fly .9s ease-out forwards;
}
.burst-particle.spark {
  width: 2px; height: 8px; border-radius: 1px;
  background: linear-gradient(to bottom, #fff8d0, var(--gold));
}
@keyframes burst-fly {
  0%   { transform: rotate(var(--a)) translateX(0); opacity:1; }
  60%  { opacity:1; }
  100% { transform: rotate(var(--a)) translateX(var(--d)); opacity:0; }
}

/* ─── CONTROLS ───────────────────────────────────────────────── */
#controls { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

#pull-btn {
  position: relative; padding: 13px 38px;
  background: linear-gradient(135deg, #3d2200, #7a4c00, #3d2200);
  border: 1.5px solid var(--gold); border-radius: 6px;
  color: var(--gold-lt); font-family: var(--fd);
  font-size: .95rem; letter-spacing: .07em;
  cursor: pointer; overflow: hidden;
  transition: box-shadow .3s, transform .2s;
}
#pull-btn:hover:not(:disabled) {
  box-shadow: 0 0 22px var(--gold-glow), 0 0 50px rgba(201,162,39,.15);
  transform: translateY(-2px);
}
#pull-btn:disabled { opacity:.6; cursor:not-allowed; }
.btn-shimmer {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,230,100,.12) 0%, transparent 70%);
  animation: shimmer 2.5s ease-in-out infinite;
}
@keyframes shimmer { 0%,100% { opacity:.4; } 50% { opacity:1; } }

#model-status {
  display: flex; align-items: center; gap: 7px;
  font-size: .78rem; color: rgba(210,185,130,.5); font-style: italic;
}
#model-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #555; transition: background .4s; flex-shrink: 0;
}
#model-dot.loading { background: #e8922a; animation: dot-blink 1s infinite; }
#model-dot.ready   { background: #5dba6e; box-shadow: 0 0 6px #5dba6e; }
#model-dot.error   { background: #b94040; }
@keyframes dot-blink { 0%,100% { opacity:1; } 50% { opacity:.25; } }

/* ─── VIEWER ─────────────────────────────────────────────────── */
#viewer {
  position: fixed; inset: 0; z-index: 20;
  background: transparent;
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
#viewer.hidden { display: none !important; }

#viewer-inner {
  width: 100%; max-width: 420px; height: 100%; max-height: 90vh;
  display: flex; flex-direction: column; align-items: center; gap: 1.1rem;
}

#pages-viewport {
  width: 100%; flex: 1; overflow: hidden; cursor: grab;
}
#pages-viewport:active { cursor: grabbing; }
#pages-track {
  display: flex; height: 100%; will-change: transform;
  transition: transform .42s cubic-bezier(.25,.46,.45,.94);
}

/* ─── AGED PARCHMENT CARD ────────────────────────────────────── */
.torn-page {
  flex: 0 0 100%; height: 100%; padding: 6px 8px;
  opacity: 0; transform: translateY(28px) rotate(-1deg);
}
.torn-page.revealed {
  animation: page-in .6s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes page-in { to { opacity:1; transform: translateY(0) rotate(0deg); } }

.page-paper {
  height: 100%;
  background: #fffef8;
  border: 1.5px solid var(--gold);
  /* Double border effect: card bg gap then second gold line */
  box-shadow:
    0 0 0 5px #fffef8,
    0 0 0 6.5px var(--gold),
    0 12px 48px rgba(0,0,0,.6),
    0  4px 16px rgba(0,0,0,.35);
  border-radius: 2px;
  padding: 22px 20px 16px;
  display: flex; flex-direction: column; gap: 14px;
  color: var(--ink); overflow-y: auto; position: relative;
}

.page-paper::before { display: none; }
.page-paper::after  { display: none; }

.page-num {
  font-family: var(--fd); font-size: .65rem; letter-spacing: .18em;
  color: rgba(80,45,10,.7); display: block; text-align: center; margin-bottom: 2px;
  background: rgba(160,120,50,.12); border-radius: 20px;
  padding: 3px 10px; width: fit-content; margin-inline: auto;
  border: 1px solid rgba(160,120,50,.2);
}
.page-title {
  font-family: var(--fd); font-size: clamp(1rem, 4vw, 1.35rem); font-weight: 700;
  color: var(--ink); text-align: center; line-height: 1.25;
}
.page-desc { text-align: center; font-style: italic; font-size: .8rem; color: rgba(80,50,15,.65); margin-top: 2px; }
.page-divider { width: 60%; margin: 0 auto; height: 1px; background: linear-gradient(90deg, transparent, rgba(160,120,50,.4), transparent); }

.page-img-wrap {
  border: 1px solid rgba(160,120,50,.35); border-radius: 3px; overflow: hidden;
  width: 100%; aspect-ratio: 16 / 9; flex-shrink: 0;
  background: rgba(200,170,100,.1);
}
.page-img-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; }

/* padding-left removed — no more margin line to clear */
.page-text { font-size: .98rem; line-height: 1.75; color: var(--ink2); flex: 1; position: relative; z-index: 1; }
.page-text.loading-text { color: rgba(80,50,20,.4); font-style: italic; text-align: center; padding-top: 1rem; }
.thinking-dots::after { content: ''; animation: thinking 1.4s steps(4, end) infinite; }
@keyframes thinking { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';}  }

.page-insight {
  background: rgba(160,120,50,.1); border-left: 2px solid rgba(160,120,50,.4);
  padding: 8px 10px; font-style: italic; font-size: .85rem; color: rgba(80,50,15,.8);
  border-radius: 0 3px 3px 0; flex-shrink: 0;
}
.page-insight strong { font-style: normal; color: var(--ink); font-family: var(--fd); font-size: .72rem; letter-spacing: .08em; }

/* margin-top: auto pushes the link to the bottom; overflow visible so it never clips */
.page-link {
  text-align: center; font-size: .78rem; padding-top: 6px;
  border-top: 1px solid rgba(160,120,50,.2); flex-shrink: 0;
  margin-top: auto; overflow: visible;
}
.page-link a { color: #7a4010; text-decoration: none; letter-spacing: .04em; }
.page-link a:hover { text-decoration: underline; }

.page-img-placeholder {
  border: 1px dashed rgba(160,120,50,.35); border-radius: 3px;
  height: 90px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  background: rgba(200,170,100,.06);
}
.pip-glyph { font-size: 1.4rem; color: rgba(160,120,50,.35); }
.pip-label {
  font-family: var(--fd); font-size: 2rem; font-weight: 900;
  color: rgba(160,120,50,.2); line-height: 1;
}

.page-paper::-webkit-scrollbar { width: 3px; }
.page-paper::-webkit-scrollbar-thumb { background: rgba(160,120,50,.3); border-radius: 2px; }

/* ─── NAV ─────────────────────────────────────────────────────── */
#viewer-nav { display: flex; align-items: center; gap: 18px; }
.nav-btn {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1.5px solid var(--gold); background: transparent;
  color: var(--gold); font-size: 1.8rem; line-height: 1;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn:hover:not(:disabled) { background: var(--gold-dim); box-shadow: 0 0 14px var(--gold-glow); }
.nav-btn:disabled { opacity:.25; cursor:default; }

#page-dots { display: flex; gap: 9px; }
.page-dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid var(--gold); background: transparent;
  cursor: pointer; padding: 0; transition: all .2s;
}
.page-dot.active { background: var(--gold); box-shadow: 0 0 7px var(--gold-glow); }

#close-btn {
  background: none; border: 1px solid rgba(201,162,39,.3);
  color: rgba(201,162,39,.6); padding: 7px 22px; border-radius: 20px;
  cursor: pointer; font-family: var(--fd); font-size: .75rem;
  letter-spacing: .06em; transition: all .25s;
}
#close-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ─── RESPONSIVE ─────────────────────────────────────────────── */
@media (max-width: 400px) {
  #book { width: 170px; height: 230px; }
  #book-stage { width: 200px; height: 260px; }
  #pull-btn { padding: 11px 28px; font-size: .85rem; }
}
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div id="app">
  <!-- SCENE -->
  <div id="scene">
    <header class="site-header">
      <div class="header-rule"></div>
      <h1>✦ &nbsp; The Book of Knowledge &nbsp; ✦</h1>
      <p>Ancient secrets await within its pages</p>
      <div class="header-rule"></div>
    </header>

    <div id="book-stage">
      <div class="book-halo"></div>
      <div id="book">
        <div class="book-cover front-cover">
          <div class="cover-border">
            <span class="cover-ornament">⁂</span>
            <div class="cover-title">
              <span class="cover-title-latin">LIBER</span>
              <span class="cover-title-latin sub">COGNITIONIS</span>
            </div>
            <span class="cover-ornament">⁂</span>
          </div>
        </div>
        <div class="book-cover back-cover"></div>
        <div class="book-spine"></div>
        <div class="book-page-block"></div>
      </div>
      <div id="burst-root"></div>
    </div>

    <div id="controls">
      <button id="pull-btn">
        <span class="btn-shimmer"></span>
        <span class="btn-label">✨ &nbsp; Open the Book &nbsp; ✨</span>
      </button>
      <div id="model-status">
        <span id="model-dot" class="loading"></span>
        <span id="model-label">Loading AI model…</span>
      </div>
    </div>
  </div>

  <!-- VIEWER -->
  <div id="viewer" class="hidden">
    <div id="viewer-inner">
      <div id="pages-viewport">
        <div id="pages-track"></div>
      </div>
      <nav id="viewer-nav">
        <button id="prev-btn" class="nav-btn" disabled>&#8249;</button>
        <div id="page-dots"></div>
        <button id="next-btn" class="nav-btn">&#8250;</button>
      </nav>
      <button id="close-btn">↩ &nbsp; Return to the Book</button>
    </div>
  </div>
</div>

<script type="module">
// ═══════════════════════════════════════════════════════════════
// WORKER BRIDGE
// All LLM work runs in worker.js off the main thread.
// The main thread only holds lightweight promise resolvers.
// ═══════════════════════════════════════════════════════════════

// pending summarise promises: id → { resolve }
const pending = new Map();

const worker = new Worker('./worker.js', { type: 'module' });

worker.addEventListener('message', ({ data }) => {
  switch (data.type) {
    case 'progress':
      modelDot.className     = 'loading';
      modelLabel.textContent = `Loading AI — ${data.pct}%`;
      break;
    case 'ready':
      modelDot.className     = 'ready';
      modelLabel.textContent = 'AI ready ✓';
      break;
    case 'error':
      modelDot.className     = 'error';
      modelLabel.textContent = 'AI unavailable — using excerpts';
      break;
    case 'summary': {
      const p = pending.get(data.id);
      if (p) { p.resolve(data.text); pending.delete(data.id); }
      break;
    }
  }
});

// Kick off model load immediately (runs in background, never blocks UI)
worker.postMessage({ type: 'load' });

// Returns a Promise that resolves when the worker replies for this article
function summarise(id, extract) {
  return new Promise(resolve => {
    const fallback = smartTrunc(extract, 320);
    pending.set(id, { resolve });
    worker.postMessage({ type: 'summarise', id, text: extract, fallback });
  });
}

function smartTrunc(text, max) {
  if (!text || text.length <= max) return text;
  const cut = text.slice(0, max), ls = cut.lastIndexOf(' ');
  return (ls > max * .75 ? cut.slice(0, ls) : cut) + '…';
}

// ═══════════════════════════════════════════════════════════════
// WIKIPEDIA
// ═══════════════════════════════════════════════════════════════
async function fetchArticle(retries = 4) {
  for (let i = 0; i < retries; i++) {
    const r = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary', { cache: 'no-store' });
    const d = await r.json();
    const extract = (d.extract || '').trim();
    if (extract.length < 80 || d.type === 'disambiguation') continue;
    return {
      title:       d.title || 'Unknown',
      description: d.description || '',
      extract,
      image:       d.thumbnail?.source ?? null,
      url:         d.content_urls?.desktop?.page ?? '',
    };
  }
  const r = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary', { cache: 'no-store' });
  const d = await r.json();
  return { title: d.title || 'Unknown', description: d.description || '',
           extract: (d.extract || 'No information found.').trim(),
           image: d.thumbnail?.source ?? null, url: d.content_urls?.desktop?.page ?? '' };
}

async function fetchArticles(n = 5) {
  const settled = await Promise.allSettled(Array.from({ length: n }, fetchArticle));
  return settled.map((r, i) =>
    r.status === 'fulfilled' ? r.value
      : { title: `Page ${i+1}`, description: '', extract: 'Lost to time…', image: null, url: '' });
}

// ═══════════════════════════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════════════════════════
const bookEl     = document.getElementById('book');
const burstRoot  = document.getElementById('burst-root');
const pullBtn    = document.getElementById('pull-btn');
const btnLabel   = pullBtn.querySelector('.btn-label');
const modelDot   = document.getElementById('model-dot');
const modelLabel = document.getElementById('model-label');
const scene      = document.getElementById('scene');
const viewer     = document.getElementById('viewer');
const track      = document.getElementById('pages-track');
const dotsEl     = document.getElementById('page-dots');
const prevBtn    = document.getElementById('prev-btn');
const nextBtn    = document.getElementById('next-btn');
const closeBtn   = document.getElementById('close-btn');
const viewport   = document.getElementById('pages-viewport');

let articles = [], idx = 0, dragX = 0, dragging = false;

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
initStarfield();

pullBtn.addEventListener('click', openBook);
prevBtn.addEventListener('click', () => goTo(idx - 1));
nextBtn.addEventListener('click', () => goTo(idx + 1));
closeBtn.addEventListener('click', closeViewer);

// Touch swipe
viewport.addEventListener('touchstart', e => { dragX = e.touches[0].clientX; }, { passive: true });
viewport.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - dragX;
  if (Math.abs(dx) > 45) goTo(dx < 0 ? idx + 1 : idx - 1);
});
// Mouse drag
viewport.addEventListener('mousedown', e => { dragging = true; dragX = e.clientX; });
window.addEventListener('mouseup', e => {
  if (!dragging) return; dragging = false;
  const dx = e.clientX - dragX;
  if (Math.abs(dx) > 45) goTo(dx < 0 ? idx + 1 : idx - 1);
});
// Keyboard
document.addEventListener('keydown', e => {
  if (viewer.classList.contains('hidden')) return;
  if (e.key === 'ArrowRight') goTo(idx + 1);
  if (e.key === 'ArrowLeft')  goTo(idx - 1);
  if (e.key === 'Escape')     closeViewer();
});

// ═══════════════════════════════════════════════════════════════
// OPEN BOOK
// ═══════════════════════════════════════════════════════════════
async function openBook() {
  pullBtn.disabled = true;
  setLabel('📜 &nbsp; Consulting the archives…');

  let fetched;
  try { fetched = await fetchArticles(5); }
  catch (err) {
    console.error(err);
    setLabel('✨ &nbsp; Open the Book &nbsp; ✨');
    pullBtn.disabled = false;
    alert('Could not reach Wikipedia. Check your connection.');
    return;
  }

  articles = fetched;
  buildShells();

  setLabel('📖 &nbsp; The book awakens…');
  await animateOpen();

  scene.classList.add('hidden');
  viewer.classList.remove('hidden');
  idx = 0;
  updateTrack(false); updateDots(); updateNavBtns();

  document.querySelectorAll('.torn-page').forEach((el, i) => {
    el.style.animationDelay = `${i * 0.12}s`;
    el.classList.add('revealed');
  });

  // Send all 5 articles to the worker simultaneously — they run in order
  // inside the worker but the main thread stays free the whole time.
  const summaryPromises = articles.map((art, i) => summarise(i, art.extract));

  // Fill each page as its summary arrives (they resolve one by one)
  summaryPromises.forEach((p, i) => p.then(text => fillPage(i, text, null)));
}

// ═══════════════════════════════════════════════════════════════
// PAGE BUILDING
// ═══════════════════════════════════════════════════════════════

function buildShells() {
  track.innerHTML = ''; dotsEl.innerHTML = '';
  articles.forEach((art, i) => {
    const page = document.createElement('div');
    page.className = 'torn-page';
    // Build image section safely — never use inline onerror with single-quotes inside innerHTML
    let imgHtml = '';
    if (art.image) {
      // Use a wrapper id so we can safely hide it on error via a global handler
      imgHtml = `<div class="page-img-wrap" id="piw-${i}">
        <img src="${esc(art.image)}" alt="${esc(art.title)}" loading="lazy"/>
      </div>`;
    } else {
      imgHtml = `<div class="page-img-placeholder">
        <span class="pip-glyph">✦</span>
        <span class="pip-label">${esc(art.title.charAt(0).toUpperCase())}</span>
      </div>`;
    }
    page.innerHTML = `
      <div class="page-paper">
        <span class="page-num">— Page ${i+1} of 5 —</span>
        <h2 class="page-title">${esc(art.title)}</h2>
        ${art.description ? `<p class="page-desc">${esc(art.description)}</p>` : ''}
        <div class="page-divider"></div>
        ${imgHtml}
        <p class="page-text loading-text thinking-dots" id="pt-${i}">The ancient scribes are transcribing</p>
        <div class="page-insight" id="pi-${i}" style="display:none"></div>
        ${art.url ? `<div class="page-link"><a href="${esc(art.url)}" target="_blank" rel="noopener">Read on Wikipedia ↗</a></div>` : ''}
      </div>`;
    track.appendChild(page);

    // Attach error handler after DOM insertion so we avoid innerHTML quoting issues
    if (art.image) {
      const imgEl  = page.querySelector('img');
      const wrapEl = page.querySelector(`#piw-${i}`);
      if (imgEl && wrapEl) {
        imgEl.addEventListener('error', () => {
          wrapEl.outerHTML = `<div class="page-img-placeholder">
            <span class="pip-glyph">✦</span>
            <span class="pip-label">${esc(art.title.charAt(0).toUpperCase())}</span>
          </div>`;
        });
      }
    }

    const dot = document.createElement('button');
    dot.className = 'page-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', `Page ${i+1}`);
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  });
}

function fillPage(i, summary, insight) {
  const t = document.getElementById(`pt-${i}`);
  const p = document.getElementById(`pi-${i}`);
  if (t) { t.className = 'page-text'; t.textContent = summary || articles[i].extract; }
  if (p && insight) { p.style.display = ''; p.innerHTML = `<strong>✦ &nbsp; Wisdom</strong><br>${esc(insight)}`; }
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════════════════
function animateOpen() {
  return new Promise(resolve => {
    bookEl.classList.add('opening');
    setTimeout(() => { flashScreen(); spawnBurst(); }, 600);
    setTimeout(resolve, 1050);
  });
}

function flashScreen() {
  const f = document.createElement('div');
  Object.assign(f.style, { position:'fixed', inset:'0', zIndex:'50',
    background:'rgba(255,240,180,.18)', pointerEvents:'none', transition:'opacity .5s' });
  document.body.appendChild(f);
  requestAnimationFrame(() => { f.style.opacity = '0'; setTimeout(() => f.remove(), 600); });
}

function spawnBurst() {
  burstRoot.innerHTML = '';
  for (let i = 0; i < 28; i++) {
    const el  = document.createElement('div');
    el.className = 'burst-particle' + (i % 5 === 0 ? '' : ' spark');
    const angle = (i / 28) * 360 + (Math.random() * 12 - 6);
    const dist  = 70 + Math.random() * 120;
    el.style.cssText = `--a:${angle}deg; --d:${dist}px; animation-delay:${Math.random() * .25}s`;
    burstRoot.appendChild(el);
  }
  setTimeout(() => { burstRoot.innerHTML = ''; }, 1400);
}

// ═══════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════
function goTo(i) {
  if (i < 0 || i >= articles.length) return;
  idx = i; updateTrack(true); updateDots(); updateNavBtns();
}
function updateTrack(anim) {
  track.style.transition = anim ? 'transform .42s cubic-bezier(.25,.46,.45,.94)' : 'none';
  track.style.transform  = `translateX(${-idx * 100}%)`;
}
function updateDots() {
  dotsEl.querySelectorAll('.page-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}
function updateNavBtns() {
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === articles.length - 1;
}
function closeViewer() {
  viewer.classList.add('hidden');
  scene.classList.remove('hidden');
  bookEl.classList.remove('opening');
  pullBtn.disabled = false;
  setLabel('✨ &nbsp; Open the Book &nbsp; ✨');
}

// ═══════════════════════════════════════════════════════════════
// CANDLELIT LIBRARY BACKGROUND
// ═══════════════════════════════════════════════════════════════
function initStarfield() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let   W = 0, H = 0;

  // Slow drifting fog pools — warm amber/sepia tones
  const POOLS = [
    { x:.15, y:.25, rx:.55, ry:.35, h:32,  s:55, l:18, a:.13, dx:.00012, dy:.00007 },
    { x:.72, y:.60, rx:.50, ry:.30, h:24,  s:48, l:14, a:.11, dx:-.00009,dy:.00010 },
    { x:.45, y:.80, rx:.65, ry:.28, h:38,  s:52, l:20, a:.10, dx:.00008, dy:-.00006 },
    { x:.85, y:.15, rx:.40, ry:.32, h:28,  s:44, l:16, a:.09, dx:-.00011,dy:.00008 },
    { x:.30, y:.55, rx:.45, ry:.25, h:20,  s:50, l:12, a:.08, dx:.00007, dy:.00009 },
  ];

  // Dust motes — tiny warm specks drifting slowly upward
  let motes = [];
  function makeMotes() {
    motes = Array.from({ length: 55 }, () => ({
      x:  Math.random() * W,
      y:  Math.random() * H,
      r:  Math.random() * 1.1 + .3,
      a:  Math.random() * .35 + .05,
      da: (Math.random() * .004 + .001) * (Math.random() < .5 ? 1 : -1),
      vy: -(Math.random() * .18 + .04),   // drift upward
      vx:  (Math.random() - .5) * .06,    // slight horizontal waver
    }));
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    makeMotes();
  }

  // Off-screen buffer for the slow fog layer (redrawn every ~3 frames)
  let fogFrame = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // ── base — very dark warm brown, not cold blue ──
    ctx.fillStyle = '#0e0a06';
    ctx.fillRect(0, 0, W, H);

    // ── subtle vignette — darken corners ──
    const vig = ctx.createRadialGradient(W*.5, H*.5, H*.15, W*.5, H*.5, H*.85);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,0,0,.55)');
    ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

    // ── drifting fog pools (amber/sepia) ──
    POOLS.forEach(p => {
      // Drift slowly, wrap around
      p.x = (p.x + p.dx + 1) % 1;
      p.y = (p.y + p.dy + 1) % 1;

      const cx = p.x * W, cy = p.y * H;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, p.rx * W);
      g.addColorStop(0,   `hsla(${p.h},${p.s}%,${p.l}%,${p.a})`);
      g.addColorStop(.5,  `hsla(${p.h},${p.s}%,${p.l}%,${p.a * .4})`);
      g.addColorStop(1,   'transparent');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(cx, cy, p.rx * W, p.ry * H, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // ── candle glow — faint warm bloom bottom-centre, like a table lamp ──
    const glow = ctx.createRadialGradient(W*.5, H, 0, W*.5, H, H*.7);
    glow.addColorStop(0,   'rgba(180,100,20,.09)');
    glow.addColorStop(.4,  'rgba(140, 70,10,.05)');
    glow.addColorStop(1,   'transparent');
    ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

    // ── dust motes ──
    motes.forEach(m => {
      m.a += m.da;
      if (m.a > .4 || m.a < .03) m.da *= -1;
      m.y += m.vy;
      m.x += m.vx;
      // wrap
      if (m.y < -2)  m.y = H + 2;
      if (m.x < -2)  m.x = W + 2;
      if (m.x > W+2) m.x = -2;

      ctx.beginPath();
      ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,175,100,${m.a})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize(); draw();
}

// ─── util ──────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setLabel(html) { btnLabel.innerHTML = html; }
</script>
